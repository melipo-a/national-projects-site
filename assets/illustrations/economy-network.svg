<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Regional economy and technology layers</title>
  <desc id="desc">A detailed country layer map with city, roads, train, factory, data network, ecology, tourism, drones and space.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f2f9ff"/>
      <stop offset=".52" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff7e6"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17324d" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1100" height="760" rx="42" fill="url(#bg)"/>
  <path d="M0 620 C150 528 324 570 500 494 C690 412 842 472 1100 362 V760 H0z" fill="#e0f3e7"/>
  <path d="M0 668 C210 590 386 650 566 558 C728 476 884 534 1100 442 V760 H0z" fill="#cfe8dc"/>

  <!-- transport line -->
  <path d="M70 614 C244 488 390 642 548 520 S816 410 1030 280" fill="none" stroke="#d7e4e8" stroke-width="34" stroke-linecap="round"/>
  <path d="M70 614 C244 488 390 642 548 520 S816 410 1030 280" fill="none" stroke="#17324d" stroke-width="5" stroke-dasharray="16 22" stroke-linecap="round" opacity=".5"/>

  <!-- city and region -->
  <g filter="url(#sh)">
    <rect x="96" y="328" width="282" height="206" rx="32" fill="#fff"/>
    <rect x="138" y="424" width="42" height="78" fill="#1769d2"/>
    <rect x="196" y="378" width="54" height="124" fill="#20a675"/>
    <rect x="268" y="404" width="44" height="98" fill="#f0a52b"/>
    <path d="M122 502 h230" stroke="#17324d" stroke-width="10" stroke-linecap="round"/>
    <circle cx="330" cy="362" r="26" fill="#20a675"/>
    <path d="M318 362 c18-22 32-20 46 0" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- factory -->
  <g filter="url(#sh)">
    <rect x="430" y="372" width="250" height="178" rx="32" fill="#fff"/>
    <path d="M472 502 h154 v34 h-154z M496 456 h34 v46 M550 430 h34 v72" fill="#d9574f"/>
    <path d="M462 536 h184" stroke="#17324d" stroke-width="10" stroke-linecap="round"/>
    <circle cx="638" cy="418" r="24" fill="#f0a52b"/>
    <path d="M636 394 c-28-28-10-54 18-70" stroke="#d7e4e8" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>

  <!-- data network/service hub -->
  <g filter="url(#sh)">
    <rect x="728" y="288" width="238" height="172" rx="32" fill="#fff"/>
    <circle cx="846" cy="374" r="52" fill="#eef4ff"/>
    <circle cx="846" cy="374" r="13" fill="#1769d2"/>
    <path d="M846 316 v116 M788 374 h116 M806 334 l80 80 M886 334 l-80 80" stroke="#1769d2" stroke-width="6" stroke-linecap="round"/>
    <rect x="760" y="428" width="74" height="12" rx="6" fill="#d7e8f2"/>
    <rect x="856" y="428" width="74" height="12" rx="6" fill="#d7e8f2"/>
  </g>

  <!-- tourism/ecology -->
  <g filter="url(#sh)">
    <rect x="126" y="160" width="226" height="136" rx="28" fill="#fff"/>
    <path d="M156 250 c42-70 72-70 112 0 c34-44 54-44 84 0" fill="#dff3e8"/>
    <circle cx="296" cy="190" r="24" fill="#f0a52b"/>
    <path d="M166 262 h158" stroke="#17324d" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- drone and space contour -->
  <g>
    <path d="M710 134 h84 M752 92 v84" stroke="#6b65b8" stroke-width="10" stroke-linecap="round"/>
    <circle cx="752" cy="134" r="18" fill="#6b65b8"/>
    <circle cx="710" cy="134" r="10" fill="#6b65b8"/>
    <circle cx="794" cy="134" r="10" fill="#6b65b8"/>
    <circle cx="752" cy="92" r="10" fill="#6b65b8"/>
    <circle cx="752" cy="176" r="10" fill="#6b65b8"/>
    <circle cx="948" cy="118" r="34" fill="#eef0ff" stroke="#6b65b8" stroke-width="6"/>
    <path d="M902 118 h92 M948 72 v92" stroke="#6b65b8" stroke-width="5" stroke-linecap="round"/>
    <path d="M864 186 C918 216 980 206 1030 168" stroke="#6b65b8" stroke-width="5" fill="none" stroke-linecap="round" opacity=".6"/>
  </g>

  <!-- train -->
  <g filter="url(#sh)">
    <rect x="712" y="552" width="172" height="56" rx="20" fill="#1769d2"/>
    <rect x="744" y="566" width="72" height="18" rx="5" fill="#dff1ff"/>
    <circle cx="752" cy="612" r="13" fill="#17324d"/>
    <circle cx="844" cy="612" r="13" fill="#17324d"/>
  </g>

  <!-- links -->
  <g stroke="#1769d2" stroke-width="4" opacity=".55" fill="none">
    <path d="M316 328 C404 240 574 232 728 334"/>
    <path d="M640 372 C694 300 786 236 900 176"/>
    <path d="M314 234 C450 180 594 166 752 134"/>
  </g>
</svg>
