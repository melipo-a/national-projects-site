<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Country as a development system</title>
  <desc id="desc">A detailed scene with a city, roads, people, budget, digital network, national goal, and visible results.</desc>
  <defs>
    <linearGradient id="heroSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e9f7ff"/>
      <stop offset=".62" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf6ee"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#1c6dd0"/>
      <stop offset=".5" stop-color="#22a879"/>
      <stop offset="1" stop-color="#f0a52b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17324d" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="1100" height="760" rx="42" fill="url(#heroSky)"/>
  <path d="M0 598 C160 520 300 560 440 492 C610 410 780 472 1100 360 V760 H0z" fill="#dff3e8"/>
  <path d="M0 642 C180 575 338 620 510 545 C690 466 840 520 1100 438 V760 H0z" fill="#cfeadd"/>

  <!-- digital network -->
  <g opacity=".65" stroke="#1c6dd0" stroke-width="3" fill="none">
    <path d="M134 174 C280 96 420 168 560 104 S826 120 954 74"/>
    <path d="M226 252 C400 172 538 260 708 198 S916 214 1000 162"/>
    <path d="M662 80 v184 M420 150 v210 M874 126 v214"/>
  </g>
  <g fill="#1c6dd0">
    <circle cx="134" cy="174" r="8"/><circle cx="560" cy="104" r="8"/><circle cx="954" cy="74" r="8"/>
    <circle cx="226" cy="252" r="7"/><circle cx="708" cy="198" r="7"/><circle cx="1000" cy="162" r="7"/>
  </g>

  <!-- national goal tower -->
  <g filter="url(#shadow)">
    <rect x="64" y="74" width="220" height="168" rx="28" fill="#fff"/>
    <circle cx="126" cy="140" r="38" fill="#1769d2"/>
    <path d="M112 141 l12 14 29-35" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="174" y="112" width="78" height="12" rx="6" fill="#d7e8f2"/>
    <rect x="174" y="140" width="56" height="12" rx="6" fill="#d7e8f2"/>
    <rect x="174" y="168" width="92" height="12" rx="6" fill="#d7e8f2"/>
    <text x="96" y="218" fill="#17324d" font-size="23" font-weight="700" font-family="Arial">цель</text>
  </g>

  <!-- budget building -->
  <g filter="url(#shadow)">
    <rect x="356" y="86" width="230" height="184" rx="28" fill="#fff"/>
    <path d="M386 148 h168 v74 h-168z" fill="#fff2d4"/>
    <path d="M386 166 h168 M420 148 v74 M470 148 v74 M520 148 v74" stroke="#f0a52b" stroke-width="6"/>
    <circle cx="420" cy="118" r="21" fill="#f0a52b"/>
    <circle cx="462" cy="118" r="21" fill="#20a675"/>
    <circle cx="504" cy="118" r="21" fill="#1769d2"/>
    <text x="398" y="250" fill="#17324d" font-size="23" font-weight="700" font-family="Arial">бюджет</text>
  </g>

  <!-- city -->
  <g filter="url(#shadow)">
    <rect x="126" y="362" width="386" height="240" rx="32" fill="#ffffff"/>
    <rect x="170" y="450" width="52" height="104" fill="#1769d2"/>
    <rect x="240" y="410" width="64" height="144" fill="#20a675"/>
    <rect x="326" y="438" width="58" height="116" fill="#f0a52b"/>
    <rect x="402" y="390" width="70" height="164" fill="#6b65b8"/>
    <path d="M150 554 h342" stroke="#17324d" stroke-width="12" stroke-linecap="round"/>
    <g stroke="#fff" stroke-width="5">
      <path d="M182 478 h16 M182 504 h16 M182 530 h16"/>
      <path d="M254 438 h16 M254 466 h16 M254 494 h16"/>
      <path d="M340 466 h16 M340 496 h16"/>
      <path d="M418 420 h18 M418 450 h18 M418 480 h18"/>
    </g>
    <circle cx="205" cy="586" r="12" fill="#20a675"/>
    <circle cx="454" cy="586" r="12" fill="#20a675"/>
  </g>

  <!-- school/medicine/public services cluster -->
  <g filter="url(#shadow)">
    <rect x="610" y="340" width="364" height="238" rx="32" fill="#fff"/>
    <rect x="646" y="410" width="88" height="116" rx="10" fill="#e9f3ff"/>
    <path d="M646 410 h88 l-44-44z" fill="#1769d2"/>
    <path d="M676 456 h28 M690 442 v28" stroke="#1769d2" stroke-width="8" stroke-linecap="round"/>
    <rect x="776" y="392" width="88" height="134" rx="12" fill="#eef9f3"/>
    <path d="M820 426 v54 M793 453 h54" stroke="#20a675" stroke-width="10" stroke-linecap="round"/>
    <rect x="894" y="430" width="48" height="96" rx="10" fill="#fff0d2"/>
    <circle cx="918" cy="402" r="24" fill="#f0a52b"/>
    <path d="M634 526 h326" stroke="#17324d" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- transport route -->
  <path d="M52 656 C248 548 350 684 518 594 C672 512 774 640 1044 480" fill="none" stroke="url(#roadGrad)" stroke-width="28" stroke-linecap="round"/>
  <path d="M70 656 C260 564 358 682 520 604 C674 530 792 636 1030 496" fill="none" stroke="#fff" stroke-width="5" stroke-dasharray="18 22" stroke-linecap="round" opacity=".9"/>
  <g filter="url(#shadow)">
    <rect x="720" y="566" width="118" height="48" rx="18" fill="#1769d2"/>
    <circle cx="746" cy="616" r="13" fill="#17324d"/>
    <circle cx="812" cy="616" r="13" fill="#17324d"/>
    <rect x="746" y="576" width="54" height="18" rx="5" fill="#dff1ff"/>
  </g>

  <!-- people -->
  <g>
    <circle cx="538" cy="548" r="18" fill="#17324d"/>
    <path d="M516 610 c8-46 36-46 44 0" fill="#1769d2"/>
    <circle cx="584" cy="556" r="15" fill="#17324d"/>
    <path d="M566 610 c8-38 30-38 38 0" fill="#20a675"/>
    <circle cx="948" cy="590" r="15" fill="#17324d"/>
    <path d="M930 640 c8-38 30-38 38 0" fill="#f0a52b"/>
  </g>

  <!-- result panel -->
  <g filter="url(#shadow)">
    <rect x="778" y="84" width="250" height="170" rx="30" fill="#fff"/>
    <path d="M820 198 h162" stroke="#d7e8f2" stroke-width="10" stroke-linecap="round"/>
    <path d="M822 196 C858 150 902 164 930 120 C946 96 970 104 988 90" fill="none" stroke="#20a675" stroke-width="11" stroke-linecap="round"/>
    <circle cx="842" cy="148" r="22" fill="#20a675"/>
    <circle cx="930" cy="120" r="17" fill="#1769d2"/>
    <circle cx="988" cy="90" r="15" fill="#f0a52b"/>
    <text x="820" y="232" fill="#17324d" font-size="23" font-weight="700" font-family="Arial">результат</text>
  </g>
</svg>
