<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Visual map of project contours</title>
  <desc id="desc">A subject map with four sectors: people and society, regions and environment, economy and data, technology leadership.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="1" stop-color="#f3fff7"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17324d" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1100" height="760" rx="42" fill="url(#bg)"/>
  <path d="M154 166 C282 72 436 90 550 174 C672 82 864 104 948 238 C1042 388 954 584 792 620 C696 642 612 604 550 544 C458 636 296 652 180 548 C68 448 62 256 154 166z" fill="#fff" stroke="#d6e5eb" stroke-width="4" filter="url(#sh)"/>
  <path d="M550 176 C440 92 282 82 154 166 C62 256 68 448 180 548 C296 652 458 636 550 544z" fill="#e6f8ef"/>
  <path d="M550 176 C672 82 864 104 948 238 C820 262 682 286 550 364z" fill="#e4f5f8"/>
  <path d="M550 364 C682 286 820 262 948 238 C1042 388 954 584 792 620 C696 642 612 604 550 544z" fill="#fdf0d2"/>
  <path d="M550 364 C458 636 296 652 180 548 C296 504 412 456 550 364z" fill="#efedff"/>
  <circle cx="550" cy="364" r="70" fill="#fff" stroke="#d6e5eb" stroke-width="4"/>
  <text x="496" y="356" fill="#17324d" font-size="24" font-family="Arial" font-weight="700">карта</text>
  <text x="484" y="388" fill="#17324d" font-size="24" font-family="Arial" font-weight="700">проектов</text>

  <!-- people sector -->
  <g filter="url(#sh)">
    <rect x="202" y="216" width="238" height="150" rx="28" fill="#fff"/>
    <circle cx="258" cy="282" r="28" fill="#20a675"/>
    <circle cx="314" cy="282" r="24" fill="#1769d2"/>
    <path d="M230 338 c18-48 72-48 90 0 M298 338 c16-40 62-40 78 0" fill="#e6f8ef"/>
    <path d="M356 236 h46 v84 h-46z" fill="#edf7ff"/>
    <path d="M366 258 h26 M366 282 h26 M366 306 h26" stroke="#1769d2" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- regions sector -->
  <g filter="url(#sh)">
    <rect x="650" y="180" width="244" height="158" rx="28" fill="#fff"/>
    <rect x="692" y="250" width="32" height="58" fill="#1769d2"/>
    <rect x="734" y="220" width="42" height="88" fill="#20a675"/>
    <rect x="786" y="242" width="36" height="66" fill="#f0a52b"/>
    <path d="M678 308 h178" stroke="#17324d" stroke-width="8" stroke-linecap="round"/>
    <path d="M666 202 C724 178 788 180 868 216" stroke="#1c9aaa" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="864" cy="252" r="20" fill="#20a675"/>
  </g>

  <!-- economy sector -->
  <g filter="url(#sh)">
    <rect x="646" y="450" width="248" height="150" rx="28" fill="#fff"/>
    <rect x="696" y="530" width="34" height="38" fill="#f0a52b"/>
    <rect x="746" y="496" width="34" height="72" fill="#f0a52b"/>
    <rect x="796" y="474" width="34" height="94" fill="#f0a52b"/>
    <path d="M684 568 h166" stroke="#17324d" stroke-width="8" stroke-linecap="round"/>
    <circle cx="844" cy="482" r="20" fill="#1769d2"/>
    <path d="M844 454 v56 M816 482 h56" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- technology sector -->
  <g filter="url(#sh)">
    <rect x="198" y="444" width="260" height="160" rx="28" fill="#fff"/>
    <rect x="236" y="522" width="82" height="46" rx="10" fill="#6b65b8"/>
    <path d="M252 522 v-48 h28 v48 M300 522 v-72 h28 v72" fill="#6b65b8"/>
    <circle cx="392" cy="512" r="34" fill="#edf0ff"/>
    <circle cx="392" cy="512" r="10" fill="#6b65b8"/>
    <path d="M348 512 h88 M392 468 v88 M362 482 l60 60 M422 482 l-60 60" stroke="#6b65b8" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g stroke="#17324d" stroke-width="5" stroke-linecap="round" opacity=".42" fill="none">
    <path d="M440 292 C492 308 526 332 550 364"/>
    <path d="M650 260 C606 286 578 320 550 364"/>
    <path d="M650 522 C600 482 572 422 550 364"/>
    <path d="M458 524 C502 472 530 420 550 364"/>
  </g>
</svg>
